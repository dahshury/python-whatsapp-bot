# Local docker-compose configuration

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres_server
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=reservation_system
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/postgres:/docker-entrypoint-initdb.d
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reservation_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: reservation_backend
    env_file:
      - .env
    ports:
      - '8000:8000'
      - '8765:8765'  # WebSocket port for real-time updates
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
    environment:
      - ENV=${ENVIRONMENT:-development}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=reservation_system
      - WEBSOCKET_HOST=0.0.0.0
      - WEBSOCKET_PORT=8765
    volumes:
      - ${MOUNT_BACKEND:-./app:/app/app}
      - ./run.py:/app/run.py
      - ./requirements-backend.in:/app/requirements-backend.in
      - ./.env:/app/.env
      - ./scripts:/app/scripts
      - ./backups:/app/backups
      - /home/ubuntu/.config/rclone/rclone.conf:/root/.config/rclone/rclone.conf
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        PYTHON_BACKEND_URL: http://backend:8000
        BACKEND_URL: http://backend:8000
    container_name: reservation_frontend
    env_file:
      - .env
    ports:
      - '8501:8501'
    depends_on:
      - backend
    environment:
      - ENV=${ENVIRONMENT:-production}
      - NODE_ENV=production
      - PORT=8501
      - HOSTNAME=0.0.0.0
      - PYTHON_BACKEND_URL=http://backend:8000
      - BACKEND_URL=http://backend:8000
    volumes:
      # Only mount .env file, not the entire source code for production
      - ./.env:/app/.env
    restart: on-failure

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=24h'
    restart: on-failure

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: alertmanager
    volumes:
      - type: bind
        source: ./prometheus/alertmanager.yml
        target: /etc/alertmanager/alertmanager.yml
        read_only: true
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    ports:
      - '9093:9093'
    restart: on-failure

  # Alertmanager Discord adapter: formats alerts into rich embeds
  discord-adapter:
    image: benjojo/alertmanager-discord:latest
    container_name: alertmanager_discord
    env_file:
      - .env
    environment:
      - LISTEN_ADDRESS=0.0.0.0:9094
    ports:
      - '9094:9094'
    restart: on-failure

volumes:
  postgres_data:
